<svg xmlns="http://www.w3.org/2000/svg" viewBox="22 22 56 56" width="32" height="32">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Thickened and maximized infinity path shape to fill bounding box -->
  <path 
    d="M 28,50 C 28,30 44,30 50,50 C 56,70 72,70 72,50 C 72,30 56,30 50,50 C 44,70 28,70 28,50 Z" 
    fill="none" 
    stroke="url(#logo-gradient)" 
    stroke-width="11" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  <!-- Data node points at key coordinates -->
  <circle cx="28" cy="50" r="6.5" fill="#14b8a6" />
  <circle cx="72" cy="50" r="6.5" fill="#8b5cf6" />
  <circle cx="50" cy="50" r="5.5" fill="#a78bfa" />
</svg>
